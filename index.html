
<script>
const ROLES = [
  { id:'swe',       icon:'💻', title:'Software Engineer',    count:'32 questions' },
  { id:'teacher',   icon:'🏫', title:'Teacher',              count:'30 questions' },
  { id:'accountant',icon:'📒', title:'Accountant',           count:'30 questions' },
  { id:'nurse',     icon:'🩺', title:'Nurse',                count:'30 questions' },
  { id:'sales',     icon:'🤝', title:'Sales Representative', count:'30 questions' },
  { id:'marketing', icon:'📣', title:'Marketing Manager',    count:'31 questions' },
  { id:'hr',        icon:'🧑‍💼', title:'HR Manager',           count:'30 questions' },
  { id:'analyst',   icon:'📊', title:'Data Analyst',         count:'32 questions' },
  { id:'custom',    icon:'✏️', title:'Other role',            count:'Custom' },
];

const QB = {
  swe: [
    { q:'Tell me about yourself and your programming background.', cat:'Introduction', diff:'beginner' },
    { q:'What programming languages are you most comfortable with and why?', cat:'Technical', diff:'beginner' },
    { q:'Can you explain the difference between an array and a linked list?', cat:'Technical', diff:'beginner' },
    { q:'What is version control and why is it important?', cat:'Technical', diff:'beginner' },
    { q:'Describe a personal or academic project you built. What did it do and what did you learn?', cat:'Behavioral', diff:'beginner' },
    { q:'How do you approach debugging a piece of code that isn\'t working?', cat:'Problem Solving', diff:'beginner' },
    { q:'What is the difference between frontend and backend development?', cat:'Technical', diff:'beginner' },
    { q:'Tell me about a time you had to learn a new technology quickly. How did you handle it?', cat:'Behavioral', diff:'beginner' },
    { q:'How do you ensure your code is readable by others?', cat:'Communication', diff:'beginner' },
    { q:'What do you do when you\'re stuck on a problem for more than an hour?', cat:'Problem Solving', diff:'beginner' },
    { q:'Walk me through how you would design a URL shortener service.', cat:'System Design', diff:'intermediate' },
    { q:'Explain the concept of REST APIs and how you have used them.', cat:'Technical', diff:'intermediate' },
    { q:'What is the difference between SQL and NoSQL databases? When would you use each?', cat:'Technical', diff:'intermediate' },
    { q:'Describe a time a bug you introduced caused a significant problem. How did you resolve it?', cat:'Behavioral', diff:'intermediate' },
    { q:'How do you approach code reviews — both when reviewing others\' code and receiving feedback?', cat:'Communication', diff:'intermediate' },
    { q:'Explain the concept of time complexity. Give an example where choosing the wrong algorithm caused performance issues.', cat:'Technical', diff:'intermediate' },
    { q:'Tell me about a time you disagreed with a technical decision on your team. What did you do?', cat:'Behavioral', diff:'intermediate' },
    { q:'How do you balance writing tests versus shipping features quickly?', cat:'Problem Solving', diff:'intermediate' },
    { q:'Describe a situation where you had to refactor a large piece of legacy code. What was your approach?', cat:'Situational', diff:'intermediate' },
    { q:'How do you stay up to date with new technologies and best practices?', cat:'Communication', diff:'intermediate' },
    { q:'Design a rate-limiting system that can handle millions of requests per day.', cat:'System Design', diff:'advanced' }
  ]
};

// Application state and setup functions
let selectedRole = '';
let selectedDiff = 'beginner';

document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('rolesGrid');
    ROLES.forEach(r => {
        const div = document.createElement('div');
        div.className = 'role-card';
        div.id = `card-${r.id}`;
        div.onclick = () => selectRole(r.id);
        div.innerHTML = `<span class="role-card-icon">${r.icon}</span><div class="role-card-title">${r.title}</div><div class="role-card-count">${r.count}</div>`;
        grid.appendChild(div);
    });
});

function selectRole(id) {
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(`card-${id}`).classList.add('selected');
    selectedRole = id;
    document.getElementById('customWrap').style.display = id === 'custom' ? 'block' : 'none';
    checkStartValidity();
}

function setDiff(btn) {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDiff = btn.getAttribute('data-diff');
}

function onCustomInput() { checkStartValidity(); }

function checkStartValidity() {
    const btn = document.getElementById('startBtn');
    if (!selectedRole) return btn.disabled = true;
    if (selectedRole === 'custom') {
        btn.disabled = document.getElementById('customRoleInput').value.trim() === '';
    } else {
        btn.disabled = false;
    }
}

function goHome() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('landing').classList.add('active');
}
</script>
